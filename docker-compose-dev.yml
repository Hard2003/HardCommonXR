version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tcxr_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: tcxr_cares
      MYSQL_USER: tcxr_admin
      MYSQL_PASSWORD: tcxr_password_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - tcxr_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tcxr_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_password_123
      PMA_DATABASE: tcxr_cares
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - tcxr_network

volumes:
  mysql_data:

networks:
  tcxr_network:
    driver: bridge
